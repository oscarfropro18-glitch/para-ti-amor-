<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>¿Quieres ser mi Valentín?</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        height: 100vh;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .card {
        background: white;
        padding: 40px;
        border-radius: 25px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        max-width: 400px;
        position: relative;
        z-index: 2;
    }

    h1 {
        color: #e63946;
        font-size: 28px;
    }

    p {
        font-size: 18px;
        color: #555;
        margin-top: 10px;
    }

    img {
        width: 100%;
        max-width: 260px;
        margin: 20px 0;
    }

    .buttons {
        margin-top: 20px;
        position: relative;
        height: 90px;
    }

    button {
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        margin: 10px;
        transition: transform 0.2s;
    }

    #yes {
        background: #e63946;
        color: white;
    }

    #yes:hover {
        transform: scale(1.1);
    }

    #no {
        background: #ccc;
        position: relative;
    }

    /* corazones */
    .heart {
        position: absolute;
        width: 20px;
        height: 20px;
        background: red;
        transform: rotate(45deg);
        animation: float 6s infinite;
        opacity: 0.7;
    }

    .heart::before,
    .heart::after {
        content: '';
        width: 20px;
        height: 20px;
        background: red;
        border-radius: 50%;
        position: absolute;
    }

    .heart::before { top: -10px; left: 0; }
    .heart::after { left: -10px; top: 0; }

    @keyframes float {
        from { transform: translateY(100vh) rotate(45deg); }
        to { transform: translateY(-10vh) rotate(45deg); }
    }

    /* mensaje final */
    .final-message {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 5;
        font-family: 'Great Vibes', cursive;
        padding: 45px 55px;
        border-radius: 35px;
        background:
          radial-gradient(circle at 10px 10px, #ffb6c1 20%, transparent 21%) 0 0 / 40px 40px,
          radial-gradient(circle at 30px 30px, #ffc0cb 20%, transparent 21%) 0 0 / 40px 40px,
          #fff;
        animation: appear 1s ease forwards, glow 3s ease-in-out infinite;
    }

    .final-message h2 {
        font-size: 32px;
        color: #000;
        margin-bottom: 20px;
    }

    .final-message h1 {
        font-size: 72px;
        color: #000;
        animation: pulse 1.5s infinite;
    }

    .bear {
        font-size: 80px;
        margin-top: 10px;
        animation: bearBounce 2s infinite;
    }

    .petals {
        font-size: 32px;
        margin-top: 10px;
        min-height: 40px;
    }

    @keyframes appear {
        from { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
        to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
    }

    @keyframes glow {
        0% { box-shadow: 0 0 20px rgba(255,182,193,0.6); }
        50% { box-shadow: 0 0 45px rgba(255,105,180,0.9); }
        100% { box-shadow: 0 0 20px rgba(255,182,193,0.6); }
    }

    @keyframes bearBounce {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
    }
</style>
</head>

<body>

<audio id="music" loop>
    <source src="tan_enamorados_cnco.mp3" type="audio/mpeg">
</audio>

<div class="card" id="card">
    <h1>💖 ¿Quieres ser mi Valentín? 💖</h1>
    <p>Quiero escribir un capítulo nuevo en nuestra historia este <strong>14 de febrero</strong> ✨</p>
    <img src="amor.png" alt="amor">

    <div class="buttons">
        <button id="yes" onclick="accept()">Sí 💘</button>
        <button id="no">No 🙈</button>
    </div>
</div>

<script>
    const noBtn = document.getElementById("no");
    let moves = 0;

    noBtn.addEventListener("mouseover", () => {
        moves++;

        if (moves === 7) {
            noBtn.style.display = "none";
            return;
        }

        const btnRect = document.getElementById("yes").getBoundingClientRect();

        let x, y;
        do {
            x = Math.random() * (window.innerWidth - 120);
            y = Math.random() * (window.innerHeight - 60);
        } while (
            Math.abs(x - btnRect.left) < 200 &&
            Math.abs(y - btnRect.top) < 150
        );

        noBtn.style.position = "fixed";
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    function accept() {
        document.getElementById("music").play();

        alert(
          "💖 Sabía que dirías que sí 💖\n\n" +
          "Desde que llegaste, todo en mi vida tiene más luz, más sentido y más amor."
        );

        document.getElementById("card").style.display = "none";

        const msg = document.createElement("div");
        msg.className = "final-message";
        msg.innerHTML = `
          <h2>
            Desde que llegaste a mi vida entendí que el amor no es perfecto,
            pero sí real, sincero y lleno de momentos felices cuando se comparte
            con la persona correcta 💖
          </h2>
          <h1>TE AMO Xiomi</h1>
          <div class="bear">🐻💐</div>
          <div class="petals" id="petals"></div>
        `;
        document.body.appendChild(msg);

        const petals = ["🌸","🌷","🌹","🌸","🌷","🌹"];
        let i = 0;
        const interval = setInterval(() => {
            document.getElementById("petals").textContent += petals[i];
            i++;
            if (i === petals.length) clearInterval(interval);
        }, 500);
    }

    function createHearts() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }

    setInterval(createHearts, 200);
</script>

</body>
</html>
